name: relic_workspace
publish_to: none

environment:
  sdk: ^3.9.0

workspace:
  - packages/relic
  - packages/relic_core
  - packages/relic_io
  # Internal support packages (not published)
  - packages/benchmark
  - packages/examples
  - packages/test_utils

dev_dependencies:
  melos: 8.0.0 # Required for Dart 3.9+ support

melos:
  packages:
    - packages/*

  scripts:
    test:
      exec:
        command: dart test
        concurrency: 1
      packageFilters:
        flutter: false
        dependsOn: test
        dirExists: test
      description: Run tests in all packages

    coverage:
      exec:
        command: >-
          dart pub global run coverage:test_with_coverage --branch-coverage
          --scope-output=relic
          --scope-output=relic_core
          --scope-output=relic_io
        concurrency: 1 # for saner output
      packageFilters:
        flutter: false
        dependsOn: test
        dirExists: test
      description: Run tests with coverage collection for all packages

    check:
      steps:
        - dart analyze --fatal-infos .
        - dart format --set-exit-if-changed .
        - dart pub run melos run test
      description: Run all checks (analyze, format, test)
