name: relic_workspace
publish_to: none

environment:
  sdk: ^3.8.0

workspace:
  - packages/benchmark
  - packages/examples
  - packages/relic
  - packages/relic_core
  - packages/relic_io

dev_dependencies:
  melos: ^7.0.0-dev.9

melos:
  packages:
    - packages/*

  scripts:
    test:
      run: dart test
      exec:
        concurrency: 1
      packageFilters:
        flutter: false
        dependsOn: test
        dirExists: test
      description: Run tests in all packages

    check:
      steps:
        - dart analyze --fatal-infos .
        - dart format --set-exit-if-changed .
        - melos run test
      description: Run all checks (analyze, format, test)
